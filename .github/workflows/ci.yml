name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Format
        run: cargo fmt -- --check

      - name: Test default targets
        run: cargo test --all-targets

      - name: Test net feature targets
        run: cargo test --all-targets --features net

      - name: Clippy
        run: cargo clippy --all-targets --features net -- -D warnings

      - name: Sextillion certificate
        run: cargo run --example sextillion_verify

      - name: Hyperscale seeded-affine certificate
        run: cargo run --example hyperscale_affine -- 1024

      - name: Cross-language sparse certificate
        run: |
          cargo run --release --example sparse_record -- 100000 2048 10
          python3 scripts/verify_sparse_certificate.py target/power_house_sparse_record.phsp

      - name: Validate ops CLI
        run: |
          python3 -m py_compile scripts/netctl.py
          python3 -m py_compile scripts/verify_sparse_certificate.py
          python3 scripts/netctl.py --hosts-file infra/ops_hosts.example.toml list-hosts
          python3 scripts/netctl.py --hosts-file infra/ops_hosts.example.toml deploy --hosts boot1 --dry-run --no-restart

      - name: Smoke net
        run: scripts/smoke_net.sh
